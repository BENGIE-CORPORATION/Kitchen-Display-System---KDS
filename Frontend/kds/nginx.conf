server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión ────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml
        application/wasm;

    # ── Assets con hash de contenido (Flutter los genera así) ─
    # Los archivos JS/CSS de Flutter llevan hash en el nombre,
    # se pueden cachear indefinidamente en el navegador.
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Flutter SPA — todas las rutas apuntan a index.html ───
    # Necesario para que el router de Flutter funcione en Web.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
