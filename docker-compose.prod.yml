# ══════════════════════════════════════════════════════════════
#  KDS — Docker Compose PRODUCCIÓN
#
#  Diferencias respecto a desarrollo:
#  · Backend:  stage "production" — 2 workers, sin reload
#  · Frontend: Flutter build --release (tamaño mínimo)
#  · Caddy:    reverse proxy + SSL automático (Let's Encrypt)
#  · Sin puertos expuestos en backend/frontend — solo Caddy al exterior
#  · Prometheus + Grafana incluidos (accesibles en el servidor)
#
#  Prerequisitos:
#    1. cp Backend/.env.production.example Backend/.env.production
#       # Rellenar SUPABASE_*, SECRET_KEY, CORS_ORIGINS=https://tudominio.com
#    2. cp .env.example .env
#       # Rellenar DOMAIN, API_DOMAIN, PROD_API_URL
#    3. El DNS de DOMAIN y API_DOMAIN debe apuntar a la IP del servidor
#
#  Primer deploy:
#    make prod-up
#    # Caddy obtiene el certificado SSL automáticamente
#
#  Deploys siguientes:
#    make prod-rebuild
# ══════════════════════════════════════════════════════════════

services:

  # ── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      target: production
    container_name: kds-backend-prod
    # Sin ports — solo accesible internamente a través de Caddy
    expose:
      - "8000"
    volumes:
      - kds-logs-prod:/app/logs
    env_file:
      - ./Backend/.env.production
    environment:
      - APP_ENV=production
      - DEBUG=False
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend/kds
      args:
        API_URL: "${PROD_API_URL:-https://api.tudominio.com}"
        BUILD_MODE: "release"
    container_name: kds-frontend-prod
    # Sin ports — solo accesible internamente a través de Caddy
    expose:
      - "80"
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy — reverse proxy + SSL ───────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: kds-caddy-prod
    ports:
      - "80:80"      # HTTP → redirige automáticamente a HTTPS
      - "443:443"    # HTTPS
      - "443:443/udp" # HTTP/3
    volumes:
      - ./monitoring/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data         # certificados SSL (persistentes)
      - caddy-config:/config     # config cache de Caddy
    environment:
      # Estos valores se leen en el Caddyfile como {$DOMAIN} y {$API_DOMAIN}
      - DOMAIN=${DOMAIN:-tudominio.com}
      - API_DOMAIN=${API_DOMAIN:-api.tudominio.com}
    restart: always
    depends_on:
      - backend
      - frontend

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kds-prometheus-prod
    expose:
      - "9090"      # solo interno — acceder via SSH tunnel o abrir con firewall
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-prod:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"   # 90 días en prod
      - "--web.enable-lifecycle"
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      cadvisor:
        condition: service_started

  # ── Loki — agregador de logs ──────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: kds-loki-prod
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data-prod:/loki
    command: -config.file=/etc/loki/config.yml
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Promtail — agente de logs ─────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.2
    container_name: kds-promtail-prod
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - kds-logs-prod:/var/log/kds:ro   # mismo named volume que el backend
    command: -config.file=/etc/promtail/config.yml
    restart: always
    depends_on:
      loki:
        condition: service_healthy

  # ── cAdvisor — métricas de contenedores Docker ────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: kds-cadvisor-prod
    expose:
      - "8080"      # solo interno — Prometheus scrapea por la red interna
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: always

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kds-grafana-prod
    expose:
      - "3000"      # solo interno — acceder via SSH tunnel: ssh -L 3001:localhost:3000 user@server
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-cambia-esto-en-prod}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/kds.json
      - GF_FEATURE_TOGGLES_ENABLE=lokiLogsDataplane
    restart: always
    depends_on:
      - prometheus
      - loki

volumes:
  kds-logs-prod:
    name: kds-logs-prod
  caddy-data:
    name: kds-caddy-data
  caddy-config:
    name: kds-caddy-config
  prometheus-data-prod:
    name: kds-prometheus-data-prod
  grafana-data-prod:
    name: kds-grafana-data-prod
  loki-data-prod:
    name: kds-loki-data-prod
