# ══════════════════════════════════════════════════════════════
#  Grafana Alerting — Alert Rules
#
#  Todas las reglas usan la carpeta "KDS" (creada por dashboards.yml).
#  Datos: Prometheus (uid: "prometheus") y Loki (uid: "loki").
#
#  Cómo funciona cada regla:
#    - refId "A": query de datos
#    - refId "C": expresión de umbral que evalúa A
#    - condition: "C" → Grafana dispara la alerta cuando C es verdadero
# ══════════════════════════════════════════════════════════════

apiVersion: 1

groups:

  # ── Alertas críticas de API ───────────────────────────────────
  - orgId: 1
    name: KDS — API
    folder: KDS
    interval: 1m
    rules:

      - uid: kds-alert-http-error-rate
        title: "Alta tasa de errores HTTP 5xx"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.05] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Tasa de errores HTTP 5xx supera el 5%"
          description: "Más del 5% de las solicitudes retornan error 5xx en los últimos 5 minutos. Revisar logs en el dashboard KDS — Logs."
          dashboard_url: "/d/kds-logs-v1/kds-logs"

      - uid: kds-alert-latency-p95
        title: "Latencia p95 alta (> 2s)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2.0] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latencia p95 supera 2 segundos"
          description: "El percentil 95 de latencia de la API supera los 2 segundos. Posible cuello de botella en base de datos o procesamiento."
          dashboard_url: "/d/kds-negocio-v1/kds-negocio"

  # ── Alertas de negocio ────────────────────────────────────────
  - orgId: 1
    name: KDS — Negocio
    folder: KDS
    interval: 2m
    rules:

      - uid: kds-alert-sin-caja-abierta
        title: "Sin caja abierta"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "kds_cajas_sesiones_abiertas_actual"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: NoData
        execErrState: Error
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No hay ninguna caja abierta"
          description: "Llevan más de 10 minutos sin caja abierta. Si es horario de operación, verificar que se haya iniciado sesión de caja."
          dashboard_url: "/d/kds-negocio-v1/kds-negocio"

      - uid: kds-alert-alta-tasa-reversiones
        title: "Alta tasa de reversiones de pago"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "sum(increase(kds_pagos_reversados_total[1h]))"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [10] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Más de 10 reversiones de pago en 1 hora"
          description: "Número inusualmente alto de reversiones de pago. Posible problema operativo o fraude."
          dashboard_url: "/d/kds-negocio-v1/kds-negocio"

      - uid: kds-alert-logins-fallidos
        title: "Múltiples logins fallidos"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "sum(increase(kds_auth_logins_total{resultado!=\"exito\"}[5m]))"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [20] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Más de 20 logins fallidos en 5 minutos"
          description: "Posible ataque de fuerza bruta o problema de autenticación masivo."
          dashboard_url: "/d/kds-negocio-v1/kds-negocio"

  # ── Alertas de infraestructura ────────────────────────────────
  - orgId: 1
    name: KDS — Infraestructura
    folder: KDS
    interval: 1m
    rules:

      - uid: kds-alert-cpu-alta
        title: "CPU muy alta en contenedor backend"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "rate(container_cpu_usage_seconds_total{name=\"kds-backend-prod\"}[2m]) * 100"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [80] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU del backend supera el 80%"
          description: "El contenedor kds-backend-prod lleva 5 minutos con CPU > 80%. Considerar escalado horizontal."
          dashboard_url: "/d/kds-sistema-v1/kds-sistema"

      - uid: kds-alert-memoria-alta
        title: "Memoria alta en contenedor backend"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: "container_memory_rss{name=\"kds-backend-prod\"}"
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: { type: gt, params: [536870912] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memoria del backend supera 512 MB"
          description: "El contenedor kds-backend-prod usa más de 512 MB de RAM. Posible memory leak."
          dashboard_url: "/d/kds-sistema-v1/kds-sistema"

  # ── Alertas de logs (Loki) ────────────────────────────────────
  - orgId: 1
    name: KDS — Logs
    folder: KDS
    interval: 1m
    rules:

      - uid: kds-alert-errores-logs
        title: "Pico de errores en logs"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: "sum(rate({job=\"kds-backend\", level=\"ERROR\"}[5m]))"
              instant: false
              queryType: range
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: reduce
              refId: B
              expression: A
              reducer: last
          - refId: D
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.1] }
                  operator: { type: and }
                  query: { params: [B] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Tasa de logs ERROR supera 0.1/s"
          description: "Más de 6 errores por minuto en los logs del backend. Investigar en el dashboard de Logs."
          dashboard_url: "/d/kds-logs-v1/kds-logs"
